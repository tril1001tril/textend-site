<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Textend</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0b0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin: 6px;
      transition: 0.2s;
    }

    .prime {
      background: #ff9800;
      color: #000;
    }

    .nexus {
      background: #4CAF50;
      color: #000;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Textend</h1>

    <p>
      Highlight, organize, and export what matters.<br/>
      A futuristic knowledge layer for the web.
    </p>

    <!-- TEMP TEST BUTTONS (simulate Stripe redirect) -->
    <a class="btn prime" href="success.html?tier=prime">
      Upgrade to Prime
    </a>

    <a class="btn nexus" href="success.html?tier=nexus">
      Upgrade to Nexus
    </a>
  </div>
</body>
</html>
