<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Textend Upgrade Success</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: #111;
      padding: 24px;
      border-radius: 14px;
      width: 320px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    h1 {
      margin-top: 0;
      font-size: 20px;
    }

    p {
      opacity: 0.7;
      font-size: 14px;
      line-height: 1.4;
    }

    .tier {
      margin: 12px 0;
      font-size: 18px;
      font-weight: bold;
    }

    #tier {
      color: #4CAF50;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }

    .buttons {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: #222;
      color: #fff;
    }

    button:hover {
      background: #333;
    }

    .primary {
      background: #ff9800;
      color: #000;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Textend Upgrade</h1>

    <p>
      Your checkout returned to Textend.<br/>
      We’re applying your tier now.
    </p>

    <div class="tier">
      Tier: <span id="tier">Loading...</span>
    </div>

    <div id="status">Starting...</div>

    <div class="buttons">
      <button id="open-upgrade" class="primary">
        Open upgrade panel
      </button>

      <button id="close-page">
        Close
      </button>
    </div>
  </div>

  <!-- IMPORTANT: this connects to your logic -->
  <script src="success.js"></script>
</body>
</html>
