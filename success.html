<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Textend Upgrade Success</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: #111;
      padding: 24px;
      border-radius: 14px;
      width: 320px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      margin-top: 0;
      font-size: 20px;
    }

    p {
      opacity: 0.7;
      font-size: 14px;
      line-height: 1.4;
    }

    .tier {
      margin: 12px 0;
      font-size: 18px;
      font-weight: bold;
    }

    #tier {
      color: #4CAF50;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.85;
      min-height: 18px;
    }

    .buttons {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: #222;
      color: #fff;
      transition: 0.2s;
    }

    button:hover {
      background: #333;
      transform: translateY(-1px);
    }

    .primary {
      background: #ff9800;
      color: #000;
    }

    .spinner {
      margin: 10px auto 0;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top: 2px solid #4CAF50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Textend Upgrade</h1>

    <p>
      Your checkout returned to Textend.<br/>
      We’re applying your tier now.
    </p>

    <div class="tier">
      Tier: <span id="tier">Loading...</span>
    </div>

    <div id="status">Initializing...</div>

    <div id="spinner" class="spinner"></div>

    <div class="buttons">
      <button id="open-upgrade" class="primary">
        Open upgrade panel
      </button>

      <button id="close-page">
        Close
      </button>
    </div>
  </div>

  <!-- Existing logic -->
  <script src="success.js"></script>

  <!-- 🔥 Enhancement layer (non-breaking) -->
  <script>
    const spinner = document.getElementById("spinner");
    const statusEl = document.getElementById("status");

    function setDoneState() {
      if (spinner) spinner.classList.add("hidden");

      if (statusEl) {
        statusEl.textContent = "Upgrade complete ✓";
        statusEl.style.color = "#4CAF50";
      }

      // 🔥 Auto-close after a delay (feels premium)
      setTimeout(() => {
        try {
          window.close();
        } catch {}
      }, 1800);
    }

    // Watch for tier update from success.js
    const observer = new MutationObserver(() => {
      const tier = document.getElementById("tier")?.textContent || "";
      if (tier && tier !== "Loading..." && tier !== "...") {
        setDoneState();
      }
    });

    observer.observe(document.getElementById("tier"), {
      childList: true
    });

    // Fallback: if extension messaging fails
    setTimeout(() => {
      if (!spinner.classList.contains("hidden")) {
        statusEl.textContent = "Finalizing upgrade...";
      }
    }, 2000);
  </script>
</body>
</html>
